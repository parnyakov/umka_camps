<script>
const orgId = location.pathname.replace('/org/','').replace(/\//g,'');
let orgName = '';

const CAT_BG = {
  'IT':         'linear-gradient(135deg,#EEF2FF,#C7D2FE)',
  'спорт':      'linear-gradient(135deg,#ECFDF5,#A7F3D0)',
  'творчество': 'linear-gradient(135deg,#FFFBEB,#FDE68A)',
  'языки':      'linear-gradient(135deg,#EFF6FF,#BFDBFE)',
  'развитие':   'linear-gradient(135deg,#F5F3FF,#DDD6FE)',
};

function initials(name) {
  return (name||'').split(/[\s«»""]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(`/api/orgs/${orgId}`);
    if (!res.ok) {
      app.innerHTML = `<div class="not-found"><h2 style="font-size:24px;margin-bottom:10px">Организация не найдена</h2><p style="color:var(--text2);margin-bottom:16px">Попробуйте вернуться в каталог</p><a href="/orgs" style="color:var(--em)">← Все кружки и секции</a></div>`;
      return;
    }
    const org = await res.json();
    orgName = org.name;
    document.title = `${org.name} — UMKA HUB`;
    render(org);
  } catch(e) {
    app.innerHTML = `<div class="not-found"><h2>Ошибка загрузки</h2><p>${e.message}</p></div>`;
  }
}

// ── Garbage filter for scraped programs ───────────────────────────────────
function cleanPrograms(list) {
  const BAD = /реклам|конфиденциальн|настройк|выбери|privacy|cookie|ваше имя|справочный|для компаний|оценивать|персонализир|управлени|перейти|узнать больше|g\.co\//i;
  return (list || []).filter(p => {
    if (!p) return false;
    const s = String(p).trim();
    if (s.length < 3 || s.length > 80) return false;
    if (s.endsWith('*') || s.endsWith('.')) return false;
    if (BAD.test(s)) return false;
    // Catch concatenated nav text like "ФункцииЗвонкиОбмен"
    if (/[а-яa-z][А-ЯA-Z]/.test(s)) return false;
    return true;
  });
}

function cleanSkills(list) {
  const BAD = /реклам|конфиденциальн|настройк|частые вопрос|ваше имя|управлени|privacy/i;
  return (list || []).filter(s => {
    if (!s || s.length < 12 || s.length > 220) return false;
    if (s.includes('?')) return false; // FAQ questions scraped from sites
    if (BAD.test(s)) return false;
    return true;
  });
}

function render(org) {
  const bg = CAT_BG[org.category] || 'linear-gradient(135deg,#F0F9FF,#E0F2FE)';
  const ini = initials(org.name);
  // main_photo takes priority; fallback to first item in photos array
  const mainPhoto = org.main_photo || (org.photos && org.photos[0]) || '';
  const photos = (org.photos || []).filter(p => p && p !== mainPhoto);

  let heroHtml;
  if (mainPhoto) {
    heroHtml = `<img class="hero-img" src="${esc(mainPhoto)}" alt="${esc(org.name)}" loading="lazy"
      style="cursor:pointer" onclick="openLightbox(0)"
      onerror="this.outerHTML='<div class=hero-placeholder style=\\'background:${bg}\\'>${ini}</div>'">`;
  } else {
    heroHtml = `<div class="hero-placeholder" style="background:${bg}">${ini}</div>`;
  }

  // Header
  const ratingHtml = org.rating ? `
    <div class="rating">
      <span class="stars">★★★★★</span>
      <span class="val">${org.rating.toFixed(1)}</span>
      ${org.reviews_count ? `<span class="cnt">(${org.reviews_count} отзывов)</span>` : ''}
    </div>` : '';

  const badges = [
    org.age_range   && `<span class="badge badge-age">${esc(org.age_range)}</span>`,
    org.category    && `<span class="badge">${esc(org.category)}</span>`,
    org.subcategory && `<span class="badge">${esc(org.subcategory)}</span>`,
    org.metro       && `<span class="badge">м. ${esc(org.metro)}</span>`,
    org.has_trial   && `<span class="badge badge-trial">Пробное занятие</span>`,
  ].filter(Boolean).join('');

  // Key facts
  const facts = [
    org.price      && { l:'Стоимость',    v: org.price },
    org.age_range  && { l:'Возраст',      v: org.age_range },
    org.group_size && { l:'Размер группы',v: org.group_size },
    org.duration   && { l:'Длительность', v: org.duration },
    org.schedule   && { l:'Расписание',   v: org.schedule },
    org.district   && { l:'Район',        v: org.district },
  ].filter(Boolean);
  const factsHtml = facts.length ? `
    <div class="section">
      <div class="section-title">Ключевая информация</div>
      <div class="facts-grid">
        ${facts.map(f=>`<div class="fact-card"><div class="fact-label">${esc(f.l)}</div><div class="fact-value">${esc(f.v)}</div></div>`).join('')}
      </div>
    </div>` : '';

  // Description
  const descHtml = org.description ? `
    <div class="section">
      <div class="section-title">Об организации</div>
      <div class="section-body">${esc(org.description)}</div>
    </div>` : '';

  // Programs — filtered from garbage
  const programs = cleanPrograms(org.programs);
  const progsHtml = programs.length ? `
    <div class="section">
      <div class="section-title">Программы и направления</div>
      <div class="programs-wrap">${programs.map(p=>`<span class="prog-tag">${esc(p)}</span>`).join('')}</div>
    </div>` : '';

  // Skills — filtered from scraped FAQ/garbage
  const skills = cleanSkills(org.skills);
  const skillsHtml = skills.length ? `
    <div class="section">
      <div class="section-title">Почему выбирают</div>
      <ul class="skills-list">${skills.slice(0,6).map(s=>`<li>${esc(s)}</li>`).join('')}</ul>
    </div>` : '';

  // Gallery — all photos (hero is photos[0], gallery shows all for lightbox)
  const allPhotos = org.photos || [];
  const galleryExtra = allPhotos.slice(1, 9); // 2 extra after hero
  const galleryClass = galleryExtra.length >= 3 ? 'gallery gallery-3' : 'gallery';
  const galleryHtml = galleryExtra.length ? `
    <div class="section">
      <div class="section-title">Галерея</div>
      <div class="${galleryClass}">${galleryExtra.map((p,i)=>`<img src="${esc(p)}" loading="lazy" alt=""
        onclick="openLightbox(${i+1})" onerror="this.closest('div').style.display='none'">`).join('')}</div>
    </div>` : '';

  // How it works
  const howHtml = `
    <div class="section">
      <div class="section-title">Как записаться</div>
      <div class="how-steps">
        <div class="how-step"><div class="how-icon">📋</div><div class="how-text"><h4>Оставьте заявку</h4><p>Нажмите «Записаться» — заявка уйдёт напрямую в организацию без посредников и скрытых комиссий.</p></div></div>
        <div class="how-step"><div class="how-icon">📞</div><div class="how-text"><h4>Организация свяжется с вами</h4><p>Вам расскажут о расписании, ценах и пробном занятии. Обычно перезванивают в течение нескольких часов.</p></div></div>
        <div class="how-step"><div class="how-icon">✅</div><div class="how-text"><h4>Приходите на пробный урок</h4><p>Большинство студий предлагают первое занятие бесплатно — чтобы вы и ребёнок точно не ошиблись с выбором.</p></div></div>
      </div>
    </div>`;

  // FAQ
  const faqHtml = `
    <div class="section">
      <div class="section-title">Частые вопросы</div>
      <div class="faq-item"><button class="faq-q">Платно ли пользоваться сервисом?<span class="faq-arrow">⌄</span></button><div class="faq-a">Нет. UMKA HUB — бесплатный сервис для родителей. Вы записываетесь напрямую в организацию по официальным ценам без наценок.</div></div>
      <div class="faq-item"><button class="faq-q">Есть ли пробное занятие?<span class="faq-arrow">⌄</span></button><div class="faq-a">Уточните при записи — большинство хороших студий предлагают первое занятие бесплатно или со скидкой. Не стесняйтесь спрашивать.</div></div>
      <div class="faq-item"><button class="faq-q">Как быстро ответит организация?<span class="faq-arrow">⌄</span></button><div class="faq-a">Обычно в течение нескольких часов в рабочее время. Если не отвечают больше суток — напишите нам, поможем разобраться.</div></div>
      <div class="faq-item"><button class="faq-q">Можно ли отменить запись?<span class="faq-arrow">⌄</span></button><div class="faq-a">Условия отмены устанавливает каждая организация. Если занятия ещё не начались и оплата не прошла — как правило, всё решается без проблем.</div></div>
    </div>`;

  // Store photos for lightbox navigation
  window._orgPhotos = allPhotos;

  // Sidebar
  const trialCallout = org.has_trial ? `<div class="trial-callout"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#16A34A" stroke-width="1.5"/><path d="M5 8.5l2 2 4-4" stroke="#16A34A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Есть пробное занятие</div>` : '';
  document.getElementById('app').innerHTML = `
    <div class="hero">${heroHtml}</div>
    <div class="org-header">
      <div class="org-name">${esc(org.name)}</div>
      <div class="org-meta">${ratingHtml}${badges}</div>
    </div>
    <div class="content-grid">
      <div>
        ${factsHtml}
        ${descHtml}
        ${progsHtml}
        ${skillsHtml}
        ${galleryHtml}
        ${howHtml}
        ${faqHtml}
      </div>
      <div class="org-sidebar">
        <div class="price-card">
          <div class="price-label">Стоимость</div>
          <div class="price-value">${esc(org.price || 'Цена по запросу')}</div>
          ${trialCallout}
          <button class="btn-cta" id="btnCta">Записаться на занятие</button>
          <div class="price-note">Свяжемся с вами в течение 2 часов</div>
        </div>
      </div>
    </div>`;

  document.getElementById('btnCta').addEventListener('click', openModal);
}

function openModal() {
  document.getElementById('modalOrgName').textContent = orgName;
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  ['fName','fPhone','fTelegram','fAge','fDirection','fComment'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.faq-q');
  if (!btn) return;
  const item = btn.closest('.faq-item');
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
});

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const name  = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if (!name || !phone) { alert('Укажите имя и телефон'); return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  try {
    const res = await fetch('/api/lead', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        org_name: orgName, parent_name: name, phone,
        telegram:  document.getElementById('fTelegram').value.trim(),
        child_age: document.getElementById('fAge').value.trim(),
        direction: document.getElementById('fDirection').value.trim(),
        comment:   document.getElementById('fComment').value.trim(),
      })
    });
    const d = await res.json();
    if (d.ok) {
      if (typeof ym !== 'undefined') ym(110484022,'reachGoal','org_lead');
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').style.display = 'block';
    } else alert(d.error || 'Ошибка');
  } catch { alert('Ошибка сети'); }
  finally { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
});

// ── Lightbox ──────────────────────────────────────────────────────────────
let _lbPhotos = [], _lbIdx = 0;

function openLightbox(idx) {
  _lbPhotos = window._orgPhotos || [];
  if (!_lbPhotos.length) return;
  _lbIdx = idx;
  document.getElementById('lbImg').src = _lbPhotos[_lbIdx];
  document.getElementById('lightbox').classList.add('open');
}

function lbNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbPhotos.length) % _lbPhotos.length;
  document.getElementById('lbImg').src = _lbPhotos[_lbIdx];
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

load();
</script>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)this.classList.remove('open')">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">×</button>
  <button class="lightbox-nav" id="lbPrev" onclick="lbNav(-1)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-nav" id="lbNext" onclick="lbNav(1)">›</button>
</div>

</body>
</html>
