<script>
const orgId = location.pathname.replace('/org/','').replace(/\//g,'');
let orgName = '';

const CAT_BG = {
  'IT':         'linear-gradient(135deg,#EEF2FF,#C7D2FE)',
  'спорт':      'linear-gradient(135deg,#ECFDF5,#A7F3D0)',
  'творчество': 'linear-gradient(135deg,#FFFBEB,#FDE68A)',
  'языки':      'linear-gradient(135deg,#EFF6FF,#BFDBFE)',
  'развитие':   'linear-gradient(135deg,#F5F3FF,#DDD6FE)',
};
const CAT_EMOJI = {
  'IT': '💻', 'спорт': '🏆', 'творчество': '🎨',
  'языки': '🌍', 'развитие': '🧠',
};

function initials(name) {
  return (name||'').split(/[\s«»""]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Photo validation ──────────────────────────────────────────────────────
function isLogoUrl(url) {
  return /logo|логотип|brand[-_]|[-_]brand|header[-_]bg|bg[-_]header/i.test(url);
}
function isBadPhotoUrl(url) {
  const bad = /youtube|youtu\.be|ytimg|instagram|cdninstagram|fbcdn|facebook|twimg|twitter|tiktok|mycdn\.me|mc\.yandex/i;
  return bad.test(url);
}

// Настоящий сайт организации (не ватсап / телеграм / соцсети)
function isRealWebsite(url) {
  if (!url) return false;
  return !/wa\.me|whatsapp\.|api\.whatsapp|t\.me|telegram\.(me|org)|vk\.com|instagram\.com|facebook\.com|youtube\.com|youtu\.be|ok\.ru/i.test(url);
}

// Фильтр мусорных описаний — WhatsApp, Google Consent, Telegram и т.п.
function cleanDescription(text) {
  if (!text) return '';
  const garbage = [
    /whatsapp messenger/i,
    /миллиард\w* (человек|пользовател)/i,
    /бесплатное мобильное приложение/i,
    /безопасный.*?способ обмена сообщ/i,
    /google llc/i,
    /прежде чем перейти в google/i,
    /telegram.*?мессенджер/i,
    /политика конфиденциальности/i,
    /принять все файлы cookie/i,
  ];
  for (const re of garbage) {
    if (re.test(text)) return '';
  }
  return text;
}

// ── Garbage filters ───────────────────────────────────────────────────────
function cleanPrograms(list) {
  const BAD = /реклам|конфиденциальн|настройк|выбери|privacy|cookie|ваше имя|справочный|для компаний|оценивать|персонализир|управлени|перейти|узнать больше|g\.co\/|функции|звонки|каналы|whatsapp|meta\s?ai|безопасност|обмен сообщ|\bfaq\b|отзывы|\bблог\b|тренеры|документы|о клубе|сведения|для взрослых|корпоратив|расписани/i;
  const NAV_SINGLE = /^(направления|команды|о занятиях|акции|партнеры|контакты|о нас|главная|галерея|новости|тренеры|блог|отзывы|документы|сведения|преподаватели|медиа|услуги|портфолио|оплата|прокат|инструкторы|роллердром|вопрос-ответ|бассейн|секции|изучите)$/i;
  return (list||[]).filter(p => {
    if (!p) return false;
    const s = String(p).trim();
    if (s.length < 4 || s.length > 50) return false;
    if (/[!*;:]$/.test(s)) return false;
    if (s.endsWith('?')) return false;
    if (s.charCodeAt(0) > 9999) return false;
    if (/^\d[\d,.\s]*[–—\-]\s*\d+\s*(год|лет)/i.test(s)) return false;
    if (/^от\s+\d+\s+лет/i.test(s)) return false;
    if (/^для\s+/i.test(s)) return false;
    if (/^(стоимость|оплата|цена)\s/i.test(s)) return false;
    if (/^О\s+\S+$/i.test(s)) return false;
    if (/^[А-ЯA-Z]+$/.test(s)) return false;
    if (BAD.test(s)) return false;
    if (NAV_SINGLE.test(s.split(/\s+/)[0])) return false;
    if (/[а-яa-z][А-ЯA-Z]/.test(s)) return false;
    const capWords = s.split(/\s+/).filter(w => /^[А-Я]/.test(w));
    if (capWords.length >= 3) return false;
    return true;
  });
}

function cleanSkills(list) {
  const BAD = /реклам|конфиденциальн|настройк|частые вопрос|ваше имя|управлени|privacy|узнать больше/i;
  return (list||[]).filter(s => {
    if (!s || s.length < 12 || s.length > 180) return false;
    if (s.includes('?')) return false;
    if (/[!*]$/.test(s)) return false;
    if (BAD.test(s)) return false;
    return true;
  });
}

function isValidFact(v) {
  if (!v) return false;
  const s = String(v).trim();
  return s && s !== '0' && s !== '0 ч' && s !== '0ч' && s !== '-';
}

// ── Build a gallery that auto-hides broken images ─────────────────────────
// Returns HTML string; each item has onerror that removes the wrapper
function buildGallery(photos, startIdx) {
  // Filter obviously bad URLs upfront
  const valid = photos.filter(p => p && !isBadPhotoUrl(p));
  if (!valid.length) return '';
  const cls = valid.length >= 3 ? 'gallery gallery-3' : 'gallery';
  const items = valid.map((p, i) => `
    <div class="gallery-item" onclick="openLightbox(${startIdx + i})">
      <img src="${esc(p)}" loading="lazy" alt=""
        onerror="this.closest('.gallery-item').remove()"
        onload="(function(i){const w=i.naturalWidth,h=i.naturalHeight,r=w/(h||1);if(w<20||h<20||(w<380&&h<380&&r>0.72&&r<1.38))i.closest('.gallery-item').remove()})(this)">
    </div>`).join('');
  return `<div class="${cls}" id="galleryGrid">${items}</div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(`/api/orgs/${orgId}`);
    if (!res.ok) {
      app.innerHTML = `<div class="not-found"><h2 style="font-size:24px;margin-bottom:10px">Организация не найдена</h2><p style="color:var(--text2);margin-bottom:16px">Попробуйте вернуться в каталог</p><a href="/orgs" style="color:var(--em)">← Все кружки и секции</a></div>`;
      return;
    }
    const org = await res.json();
    orgName = org.name;
    document.title = `${org.name} — UMKA HUB`;
    render(org);
  } catch(e) {
    app.innerHTML = `<div class="not-found"><h2>Ошибка загрузки</h2><p>${e.message}</p></div>`;
  }
}

// Hero: reject tiny icons AND square badge-like images (Yandex awards/pins)
function checkHeroSize(img, bg, emoji, ini) {
  const w = img.naturalWidth, h = img.naturalHeight;
  const r = w / (h || 1);
  const isTiny   = w < 80 || h < 80;
  const isBadge  = w < 450 && h < 450 && r > 0.72 && r < 1.38; // square-ish = badge
  if (isTiny || isBadge) {
    img.outerHTML = `<div class="hero-placeholder" style="background:${bg}"><div class="ph-emoji">${emoji}</div><div class="ph-ini">${ini}</div></div>`;
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOrgName').textContent = orgName;
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  ['fName','fPhone','fTelegram','fAge','fDirection','fComment'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('modalOverlay').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.faq-q');
  if (!btn) return;
  const item = btn.closest('.faq-item');
  const wasOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
});

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if (!name || !phone) { alert('Укажите имя и телефон'); return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  try {
    const res = await fetch('/api/lead', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        org_name: orgName, parent_name: name, phone,
        telegram: document.getElementById('fTelegram').value.trim(),
        child_age: document.getElementById('fAge').value.trim(),
        direction: document.getElementById('fDirection').value.trim(),
        comment: document.getElementById('fComment').value.trim(),
      })
    });
    const d = await res.json();
    if (d.ok) {
      if (typeof ym !== 'undefined') ym(110484022,'reachGoal','org_lead');
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').style.display = 'block';
    } else alert(d.error || 'Ошибка');
  } catch { alert('Ошибка сети'); }
  finally { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
});

// ── Lightbox ──────────────────────────────────────────────────────────────
let _lbIdx = 0;
function openLightbox(idx) {
  const photos = window._orgPhotos || [];
  if (!photos.length) return;
  _lbIdx = idx;
  document.getElementById('lbImg').src = photos[_lbIdx];
  document.getElementById('lbCounter').textContent = `${_lbIdx+1} / ${photos.length}`;
  document.getElementById('lightbox').classList.add('open');
}
function lbNav(dir) {
  const photos = window._orgPhotos || [];
  _lbIdx = (_lbIdx + dir + photos.length) % photos.length;
  document.getElementById('lbImg').src = photos[_lbIdx];
  document.getElementById('lbCounter').textContent = `${_lbIdx+1} / ${photos.length}`;
}
function closeLb() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLb();
});

load();
