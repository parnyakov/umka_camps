<script>

let campName = '';
let campSessions = [];

// вФАвФАвФА DATE HELPERS вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const RU_MON = {
  '—П–љ–≤':0,'—Д–µ–≤':1,'–Љ–∞—А':2,'–∞–њ—А':3,'–Љ–∞–є':4,'–Є—О–љ':5,
  '–Є—О–ї':6,'–∞–≤–≥':7,'—Б–µ–љ':8,'–Њ–Ї—В':9,'–љ–Њ—П':10,'–і–µ–Ї':11
};
function parseRuDate(s) {
  if (!s) return null;
  const p = String(s).trim().split(/\s+/);
  const d = parseInt(p[0]), m = RU_MON[p[1]?.toLowerCase()];
  return (!isNaN(d) && m !== undefined) ? new Date(TODAY.getFullYear(), m, d) : null;
}
function isFuture(s) {
  const d = parseRuDate(s.date_start);
  return !d || d >= TODAY;
}
function fmt(n) { return n ? Number(n).toLocaleString('ru-RU') : ''; }
function fmtDate(d) {
  if (!d) return '';
  if (/[–∞-—П—С–Р-–ѓ–Б]/.test(d)) return d;
  try {
    const dt = new Date(d);
    if (!isNaN(dt.getTime())) return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
  } catch {}
  return d;
}

// вФАвФАвФА CONTENT CLEANUP вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function cleanText(text) {
  if (!text || !text.trim()) return '';
  const t = text.trim();
  if (/[.!?¬ї")вАЩвАЭ]$/.test(t)) return t;
  const lastIdx = Math.max(t.lastIndexOf('.'), t.lastIndexOf('!'), t.lastIndexOf('?'));
  if (lastIdx > 0 && lastIdx > t.length * 0.3) return t.slice(0, lastIdx + 1);
  return t;
}

// вФАвФАвФА REVIEWS PARSER вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function parseReviews(raw) {
  if (!raw) return [];
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const dateRe = /^\d{1,2}\s+(?:—П–љ–≤–∞—А—П|—Д–µ–≤—А–∞–ї—П|–Љ–∞—А—В–∞|–∞–њ—А–µ–ї—П|–Љ–∞—П|–Є—О–љ—П|–Є—О–ї—П|–∞–≤–≥—Г—Б—В–∞|—Б–µ–љ—В—П–±—А—П|–Њ–Ї—В—П–±—А—П|–љ–Њ—П–±—А—П|–і–µ–Ї–∞–±—А—П)\s+\d{4}/i;
  const statRe = /\d+\s+–Њ—В–Ј—Л–≤/i;
  const reviews = [];
  let i = 0;
  while (i < lines.length && (lines[i].includes('–Њ—В–і—Л—Е–∞–ї–Є') || statRe.test(lines[i]))) i++;
  while (i < lines.length) {
    if (dateRe.test(lines[i])) {
      const date = lines[i]; i++;
      const author = (i < lines.length && !dateRe.test(lines[i]) && lines[i].split(' ').length <= 4) ? lines[i++] : '';
      const textLines = [];
      while (i < lines.length && !dateRe.test(lines[i])) { textLines.push(lines[i]); i++; }
      const text = cleanText(textLines.join(' '));
      if (text) reviews.push({ date, author, text });
    } else { i++; }
  }
  return reviews;
}

}

function render(c) {
  const priceStr = c.price_min ? `–Њ—В ${fmt(c.price_min)} вВљ` : '–¶–µ–љ–∞ –њ–Њ –Ј–∞–њ—А–Њ—Б—Г';
  const photoUrl = fixPhoto(c.main_photo);
  const photo = photoUrl
    ? `<img class="hero-img" src="${photoUrl}" alt="${c.name}" loading="lazy">`
    : `<div class="hero-placeholder">рЯПХпЄП</div>`;

  const SEA_LOC = /–Ъ—А–∞—Б–љ–Њ–і–∞—А|–°–Њ—З–Є|–Ъ—А—Л–Љ|–Р–љ–∞–њ–∞|–У–µ–ї–µ–љ–і–ґ–Є–Ї|–Ґ—Г–∞–њ—Б–µ|–ѓ–ї—В–∞|–°–µ–≤–∞—Б—В–Њ–њ–Њ–ї—М|–Х–≤–њ–∞—В–Њ—А–Є—П|–Р–±—Е–∞–Ј–Є—П|–І–µ—А–љ–Њ–µ –Љ–Њ—А–µ/i;
  const BASE_FILTER = /–Њ–±–ї–∞—Б—В—М|–Я–Њ–і–Љ–Њ—Б–Ї–Њ–≤—М–µ|–Ь–Њ—Б–Ї–Њ–≤—Б–Ї|^–Ь–Њ—Б–Ї–≤–∞$|–Ы–µ–љ–Є–љ–≥—А–∞–і|–°–∞–љ–Ї—В-–Я–µ—В–µ—А–±—Г—А–≥|–Я–µ—В–µ—А–±—Г—А–≥|–Ј–∞ –≥—А–∞–љ–Є—Ж|–Ј–∞—А—Г–±–µ–ґ|–Ј–∞–≥–Њ—А–Њ–і–љ|–≥–Њ—А–Њ–і—Б–Ї–Њ–є|–≤—Л–µ–Ј–і–љ–Њ–є|–і–љ–µ–≤–љ–Њ–є|–Љ–µ–ґ–і—Г–љ–∞—А–Њ–і–љ|^–ї–∞–≥–µ—А—М$/i;
  const EXTRA_FILTER = /–±–∞—Б—Б–µ–є–љ|–љ–∞ –Љ–Њ—А–µ|—Г –Љ–Њ—А—П|–љ–∞ —З–µ—А–љ–Њ–Љ/i;
  const nearSea = SEA_LOC.test(c.location || '');
  const cats = (c.categories || [])
    .filter(ct => !BASE_FILTER.test(ct) && (nearSea || !EXTRA_FILTER.test(ct)))
    .map(ct => `<span class="badge badge-em">${ct}</span>`).join('');
  const ratingHtml = c.rating ? `
    <div class="rating">
      <span class="stars">вШЕвШЕвШЕвШЕвШЕ</span>
      <span class="val">${c.rating.toFixed(1)}</span>
      <span class="cnt">(${c.reviews_count} –Њ—В–Ј—Л–≤–Њ–≤)</span>
    </div>` : '';

  const sections = [
    ['–Ю –њ—А–Њ–≥—А–∞–Љ–Љ–µ', c.program],
    ['–Я—А–Њ–ґ–Є–≤–∞–љ–Є–µ', c.accommodation],
    ['–Я–Є—В–∞–љ–Є–µ', c.food],
    ['–С–µ–Ј–Њ–њ–∞—Б–љ–Њ—Б—В—М', c.safety],
    ['–Ю –ї–∞–≥–µ—А–µ', c.about_org],
    ['–Ю–њ–Є—Б–∞–љ–Є–µ', c.description],
  ].filter(([_, v]) => v && v.trim()).map(([title, body]) => `
    <div class="section">
      <div class="section-title">${title}</div>
      <div class="section-body">${cleanText(body)}</div>
    </div>
  `).join('');

  // Sessions вАФ only future
  const sessionsHtml = (() => {
    if (!c.sessions || c.sessions.length === 0) return '';
    const future = c.sessions.filter(s => isFuture(s));
    if (future.length === 0) return `
      <div class="section">
        <div class="section-title">–°–Љ–µ–љ—Л –Є —Ж–µ–љ—Л</div>
        <div class="no-sessions">–С–ї–Є–ґ–∞–є—И–Є–µ —Б–Љ–µ–љ—Л –Ј–∞–≤–µ—А—И–Є–ї–Є—Б—М. –°–ї–µ–і–Є—В–µ –Ј–∞ –Њ–±–љ–Њ–≤–ї–µ–љ–Є—П–Љ–Є!</div>
      </div>`;
    return `
      <div class="section">
        <div class="section-title">–°–Љ–µ–љ—Л –Є —Ж–µ–љ—Л</div>
        <table class="sessions-table">
          <thead><tr><th>–Э–∞—З–∞–ї–Њ</th><th>–Ъ–Њ–љ–µ—Ж</th><th>–Ф–љ–µ–є</th><th>–¶–µ–љ–∞</th><th></th></tr></thead>
          <tbody>
            ${future.map((s, i) => `
              <tr>
                <td>${fmtDate(s.date_start) || 'вАФ'}</td>
                <td>${fmtDate(s.date_end) || 'вАФ'}</td>
                <td>${s.duration_days || 'вАФ'}</td>
                <td class="price-td">${s.price ? fmt(s.price) + ' вВљ' : 'вАФ'}</td>
                <td><button class="session-row-btn" data-idx="${i}">–Т—Л–±—А–∞—В—М</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  })();

  const photos = (c.photos || []).filter(p => p && p !== c.main_photo).slice(0, 9);
  const galleryHtml = photos.length ? `
    <div class="section">
      <div class="section-title">–У–∞–ї–µ—А–µ—П</div>
      <div class="gallery">${photos.map(p =>
        `<img class="gallery-item" src="${fixPhoto(p)}" loading="lazy">`
      ).join('')}</div>
    </div>` : '';

  const parsedReviews = parseReviews(c.reviews);
  const reviewsHtml = parsedReviews.length ? `
    <div class="section">
      <div class="section-title">–Я–Њ—Б–ї–µ–і–љ–Є–µ –Њ—В–Ј—Л–≤—Л</div>
      ${parsedReviews.slice(0, 5).map(r => `
        <div class="review-card">
          <div class="review-meta">
            ${r.author ? `<span class="review-author">${r.author}</span>` : ''}
            <span class="review-date">${r.date}</span>
          </div>
          <div class="review-text">${r.text}</div>
        </div>
      `).join('')}
    </div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="hero">${photo}</div>
    <div class="camp-header">
      <div class="camp-name">${c.name}</div>
      <div class="camp-meta">
        ${ratingHtml}
        <span class="badge badge-age">${c.age_min || 6}вАУ${c.age_max || 17} –ї–µ—В</span>
        ${c.location ? `<span class="badge">${c.location}</span>` : ''}
        ${cats}
      </div>
    </div>
    <div class="content-grid">
      <div class="left-col">
        ${sections}
        ${sessionsHtml}
        ${galleryHtml}
        ${reviewsHtml}
      </div>
      <div class="camp-sidebar">
        <div class="price-card">
          <div class="price-label">–°—В–Њ–Є–Љ–Њ—Б—В—М</div>
          <div class="price-value">${priceStr}</div>
          <button class="btn-book-big" id="btnBook">–Ч–∞–±—А–Њ–љ–Є—А–Њ–≤–∞—В—М –Љ–µ—Б—В–Њ</button>
          <div class="price-note">–Ь—Л —Б–≤—П–ґ–µ–Љ—Б—П —Б –≤–∞–Љ–Є –≤ —В–µ—З–µ–љ–Є–µ 2 —З–∞—Б–Њ–≤</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('btnBook').addEventListener('click', () => openModal(c.name));
  document.querySelectorAll('.session-row-btn').forEach(btn => {
    btn.addEventListener('click', () => openModal(c.name, parseInt(btn.dataset.idx)));
  });
}

function openModal(name, sessionIdx) {
  document.getElementById('modalCampName').textContent = name;
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  ['fName','fPhone','fTelegram','fAge','fComment'].forEach(id => document.getElementById(id).value = '');

  const sel = document.getElementById('fSession');
  const grp = document.getElementById('sessionGroup');
  if (campSessions.length) {
    sel.innerHTML = campSessions.map((s, i) => {
      const label = [fmtDate(s.date_start), fmtDate(s.date_end)].filter(Boolean).join(' вАФ ')
        + (s.duration_days ? `, ${s.duration_days} –і–љ.` : '')
        + (s.price ? `, ${fmt(s.price)} вВљ` : '');
      return `<option value="${i}">${label}</option>`;
    }).join('');
    if (sessionIdx !== undefined) sel.value = sessionIdx;
    grp.style.display = 'block';
  } else {
    grp.style.display = 'none';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if (!name || !phone) { alert('–£–Ї–∞–ґ–Є—В–µ –Є–Љ—П –Є —В–µ–ї–µ—Д–Њ–љ'); return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '–Ю—В–њ—А–∞–≤–ї—П–µ–Љ...';
  const selEl = document.getElementById('fSession');
  const selSession = campSessions.length ? campSessions[parseInt(selEl.value) || 0] : null;
  try {
    const res = await fetch('/api/booking', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        camp_name: campName, parent_name: name, phone,
        telegram: document.getElementById('fTelegram').value.trim(),
        child_age: document.getElementById('fAge').value.trim(),
        comment: document.getElementById('fComment').value.trim(),
        session_start: selSession?.date_start || '',
        session_end: selSession?.date_end || '',
        session_price: selSession?.price || '',
      })
    });
    const d = await res.json();
    if (d.ok) {
      if (typeof ym !== 'undefined') ym(110483203, 'reachGoal', 'booking');
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').style.display = 'block';
    } else alert(d.error || '–Ю—И–Є–±–Ї–∞');
  } catch { alert('–Ю—И–Є–±–Ї–∞ —Б–µ—В–Є'); }
  finally { btn.disabled = false; btn.textContent = '–Ю—В–њ—А–∞–≤–Є—В—М –Ј–∞—П–≤–Ї—Г'; }
});

load();
</script>
</body>
</html>
