<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лагерь — Лагеря 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D1117; --bg2: #161B22; --bg3: #1C2128;
    --border: #30363D; --em: #10B981; --em-dark: #059669;
    --em-glow: rgba(16,185,129,0.15);
    --text: #E6EDF3; --text2: #8B949E; --text3: #6E7681;
    --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 16px;
  }
  .nav-logo { font-size: 18px; font-weight: 700; color: var(--em); text-decoration: none; }
  .nav-logo span { color: var(--text); }
  .nav-back { display: flex; align-items: center; gap: 6px; color: var(--text2); text-decoration: none; font-size: 14px; transition: color 0.15s; }
  .nav-back:hover { color: var(--text); }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

  /* HERO */
  .hero { border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; position: relative; }
  .hero-img { width: 100%; max-height: 420px; object-fit: cover; display: block; }
  .hero-placeholder { width: 100%; height: 260px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 64px; }

  /* HEADER */
  .camp-header { margin-bottom: 24px; }
  .camp-name { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
  .camp-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .badge {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); color: var(--text2);
  }
  .badge-em { border-color: var(--em); color: var(--em); background: var(--em-glow); }
  .badge-age { border-color: #2D3748; background: #1A2030; color: #90CDF4; }
  .badge-pool { border-color: #1A3A4A; background: #0D2535; color: #4FC3F7; }
  .rating { display: flex; align-items: center; gap: 6px; }
  .rating .stars { color: var(--em); font-size: 16px; }
  .rating .val { font-size: 18px; font-weight: 700; color: var(--em); }
  .rating .cnt { font-size: 13px; color: var(--text3); }

  /* GRID LAYOUT */
  .content-grid { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
  @media (max-width: 700px) { .content-grid { grid-template-columns: 1fr; } }

  /* SECTIONS */
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text3);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-body { font-size: 14px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }

  /* SIDEBAR */
  .camp-sidebar { position: sticky; top: 80px; }
  .price-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .price-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .price-value { font-size: 28px; font-weight: 800; color: var(--em); margin-bottom: 16px; }
  .btn-book-big {
    width: 100%; padding: 14px; background: var(--em); border: none;
    border-radius: 10px; color: #000; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-book-big:hover { background: var(--em-dark); }
  .price-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; }

  /* SESSIONS */
  .sessions-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .sessions-table th { text-align: left; padding: 8px 10px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); }
  .sessions-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .sessions-table tr:last-child td { border-bottom: none; }
  .sessions-table tr:hover td { background: var(--bg3); }
  .price-td { color: var(--em); font-weight: 600; }

  /* GALLERY */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .gallery img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: opacity 0.2s; }
  .gallery img:hover { opacity: 0.8; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 440px;
    box-shadow: var(--shadow); animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .modal-camp-name { font-size: 13px; color: var(--em); margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--em); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--text3); }
  .form-group textarea { resize: none; height: 72px; }
  .btn-submit {
    width: 100%; padding: 12px; background: var(--em); border: none;
    border-radius: 8px; color: #000; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s; margin-top: 4px;
  }
  .btn-submit:hover { background: var(--em-dark); }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }
  .modal-note { text-align: center; font-size: 11px; color: var(--text3); margin-top: 10px; }
  .modal-success { text-align: center; padding: 20px 0; }
  .modal-success .check { font-size: 48px; margin-bottom: 12px; }
  .modal-success h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-success p { font-size: 14px; color: var(--text2); }

  .not-found { text-align: center; padding: 80px 20px; }
  .not-found h2 { font-size: 24px; margin-bottom: 10px; }
  .not-found p { color: var(--text2); margin-bottom: 20px; }
  .not-found a { color: var(--em); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Лагеря<span> 2026</span></a>
  <a class="nav-back" href="/">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
    Все лагеря
  </a>
</nav>

<div class="container" id="app">
  <div style="text-align:center;padding:60px;color:var(--text3)">Загрузка...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalForm">
      <div class="modal-header">
        <div class="modal-title">Оставить заявку</div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-camp-name" id="modalCampName"></div>
      <div class="form-group"><label>Имя родителя *</label><input type="text" id="fName" placeholder="Иван Иванов"></div>
      <div class="form-group"><label>Телефон *</label><input type="tel" id="fPhone" placeholder="+7 900 000 00 00"></div>
      <div class="form-group"><label>Telegram</label><input type="text" id="fTelegram" placeholder="@username"></div>
      <div class="form-group"><label>Возраст ребёнка</label><input type="text" id="fAge" placeholder="9 лет"></div>
      <div class="form-group"><label>Комментарий</label><textarea id="fComment" placeholder="Вопросы, пожелания..."></textarea></div>
      <button class="btn-submit" id="btnSubmit">Отправить заявку</button>
      <div class="modal-note">Мы свяжемся с вами в течение 2 часов</div>
    </div>
    <div class="modal-success" id="modalSuccess" style="display:none">
      <div class="check">✅</div>
      <h3>Заявка отправлена!</h3>
      <p>Мы свяжемся с вами в течение 2 часов</p>
    </div>
  </div>
</div>

<script>
const campId = location.pathname.replace('/camp/', '').replace(/\//g, '');
let campName = '';

function fmt(n) { return n ? Number(n).toLocaleString('ru-RU') : ''; }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' }); }
  catch { return d; }
}

async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(`/api/camps/${campId}`);
    if (!res.ok) {
      app.innerHTML = `<div class="not-found"><h2>Лагерь не найден</h2><p>Возможно, он был удалён или ссылка устарела.</p><a href="/">← Вернуться в каталог</a></div>`;
      return;
    }
    const c = await res.json();
    campName = c.name;
    document.title = `${c.name} — Лагеря 2026`;
    render(c);
  } catch (e) {
    app.innerHTML = `<div class="not-found"><h2>Ошибка загрузки</h2><p>${e.message}</p></div>`;
  }
}

function render(c) {
  const priceStr = c.price_min ? `от ${fmt(c.price_min)} ₽` : 'Цена по запросу';
  const photo = c.main_photo
    ? `<img class="hero-img" src="${c.main_photo}" alt="${c.name}">`
    : `<div class="hero-placeholder">🏕️</div>`;

  const cats = (c.categories || []).map(ct => `<span class="badge badge-em">${ct}</span>`).join('');
  const ratingHtml = c.rating ? `
    <div class="rating">
      <span class="stars">★★★★★</span>
      <span class="val">${c.rating.toFixed(1)}</span>
      <span class="cnt">(${c.reviews_count} отзывов)</span>
    </div>` : '';

  const sections = [
    ['О программе', c.program],
    ['Проживание', c.accommodation],
    ['Питание', c.food],
    ['Безопасность', c.safety],
    ['О лагере', c.about_org],
    ['Описание', c.description],
  ].filter(([_, v]) => v && v.trim()).map(([title, body]) => `
    <div class="section">
      <div class="section-title">${title}</div>
      <div class="section-body">${body}</div>
    </div>
  `).join('');

  const sessions = (c.sessions || []);
  const sessionsHtml = sessions.length ? `
    <div class="section">
      <div class="section-title">Смены и цены</div>
      <table class="sessions-table">
        <thead><tr><th>Начало</th><th>Конец</th><th>Дней</th><th>Цена</th></tr></thead>
        <tbody>
          ${sessions.map(s => `
            <tr>
              <td>${fmtDate(s.date_start) || s.date_start || '—'}</td>
              <td>${fmtDate(s.date_end) || s.date_end || '—'}</td>
              <td>${s.duration_days || '—'}</td>
              <td class="price-td">${s.price ? fmt(s.price) + ' ₽' : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  const photos = (c.photos || []).filter(p => p && p !== c.main_photo).slice(0, 9);
  const galleryHtml = photos.length ? `
    <div class="section">
      <div class="section-title">Галерея</div>
      <div class="gallery">
        ${photos.map(p => `<img src="${p}" loading="lazy" alt="Фото">`).join('')}
      </div>
    </div>
  ` : '';

  const reviewsHtml = c.reviews ? `
    <div class="section">
      <div class="section-title">Отзывы</div>
      <div class="section-body">${c.reviews}</div>
    </div>
  ` : '';

  document.getElementById('app').innerHTML = `
    <div class="hero">${photo}</div>
    <div class="camp-header">
      <div class="camp-name">${c.name}</div>
      <div class="camp-meta">
        ${ratingHtml}
        <span class="badge badge-age">${c.age_min || 6}–${c.age_max || 17} лет</span>
        ${c.location ? `<span class="badge">${c.location}</span>` : ''}
        ${c.has_pool ? '<span class="badge badge-pool">🏊 Бассейн</span>' : ''}
        ${cats}
      </div>
    </div>
    <div class="content-grid">
      <div class="left-col">
        ${sections}
        ${sessionsHtml}
        ${galleryHtml}
        ${reviewsHtml}
      </div>
      <div class="camp-sidebar">
        <div class="price-card">
          <div class="price-label">Стоимость</div>
          <div class="price-value">${priceStr}</div>
          <button class="btn-book-big" id="btnBook">Забронировать место</button>
          <div class="price-note">Мы свяжемся с вами в течение 2 часов</div>
        </div>
        ${c.url ? `<a href="${c.url}" target="_blank" style="display:block;text-align:center;font-size:12px;color:var(--text3);text-decoration:none;margin-top:8px;">Открыть на vlagere.ru ↗</a>` : ''}
      </div>
    </div>
  `;

  document.getElementById('btnBook').addEventListener('click', () => openModal(c.name));
}

function openModal(name) {
  document.getElementById('modalCampName').textContent = name;
  document.getElementById('modalForm').style.display = 'block';
  document.getElementById('modalSuccess').style.display = 'none';
  ['fName','fPhone','fTelegram','fAge','fComment'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if (!name || !phone) { alert('Укажите имя и телефон'); return; }
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  try {
    const res = await fetch('/api/booking', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        camp_name: campName, parent_name: name, phone,
        telegram: document.getElementById('fTelegram').value.trim(),
        child_age: document.getElementById('fAge').value.trim(),
        comment: document.getElementById('fComment').value.trim(),
      })
    });
    const d = await res.json();
    if (d.ok) { document.getElementById('modalForm').style.display = 'none'; document.getElementById('modalSuccess').style.display = 'block'; }
    else alert(d.error || 'Ошибка');
  } catch { alert('Ошибка сети'); }
  finally { btn.disabled = false; btn.textContent = 'Отправить заявку'; }
});

load();
</script>
</body>
</html>
