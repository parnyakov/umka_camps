<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кружки и секции — UmkaHub</title>
  <link rel="stylesheet" href="/static/orgs_style.css">
</head>
<body>

<header class="header">
  <a href="/" class="logo">
    <svg viewBox="0 0 36 36" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="18" fill="#3DC9C1"/>
      <circle cx="10.5" cy="11" r="4.5" fill="white"/>
      <circle cx="25.5" cy="11" r="4.5" fill="white"/>
      <circle cx="10.5" cy="11" r="2.5" fill="#B5E8E5"/>
      <circle cx="25.5" cy="11" r="2.5" fill="#B5E8E5"/>
      <circle cx="18" cy="20" r="11.5" fill="white"/>
      <circle cx="14" cy="18" r="1.8" fill="#1A3050"/>
      <circle cx="22" cy="18" r="1.8" fill="#1A3050"/>
      <circle cx="14.6" cy="17.3" r="0.7" fill="white"/>
      <circle cx="22.6" cy="17.3" r="0.7" fill="white"/>
      <ellipse cx="18" cy="22.5" rx="4" ry="3" fill="#D6EFEE"/>
      <ellipse cx="18" cy="21" rx="2.2" ry="1.6" fill="#1A3050"/>
      <path d="M15.5 24Q18 26.5 20.5 24" stroke="#1A3050" stroke-width="1.2" stroke-linecap="round"/>
      <ellipse cx="30" cy="15.5" rx="3" ry="4.5" fill="white" transform="rotate(-28 30 15.5)"/>
      <ellipse cx="7" cy="22.5" rx="3" ry="4" fill="white" transform="rotate(18 7 22.5)"/>
    </svg>
    <span>UMKA HUB</span>
  </a>
  <div class="header-search">
    <span class="icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Поиск по названию или направлению...">
  </div>
</header>

<div class="layout">

  <!-- Sidebar фильтры -->
  <aside class="sidebar" id="sidebar">

    <div class="filter-group">
      <label>Категория</label>
      <div class="cat-pills" id="catPills">
        <div class="cat-pill active" data-cat="" onclick="setCat(this, '')">Все направления</div>
      </div>
    </div>

    <div class="filter-group">
      <label>Станция метро</label>
      <select id="metroFilter" onchange="applyFilters()">
        <option value="">Любая станция</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Возраст ребёнка</label>
      <input type="number" id="ageFilter" placeholder="Например: 7" min="2" max="18" onchange="applyFilters()">
    </div>

    <div class="filter-group">
      <label>Макс. цена (₽)</label>
      <input type="number" id="priceFilter" placeholder="Например: 3000" step="500" onchange="applyFilters()">
    </div>

    <div class="filter-group">
      <div class="toggle-row" onclick="toggleTrial()">
        <span>Только с пробным занятием</span>
        <div class="toggle" id="trialToggle"></div>
      </div>
    </div>

    <button onclick="resetFilters()" style="
      margin-top:auto; padding:10px; border:1.5px solid var(--border);
      border-radius:8px; background:none; cursor:pointer; font-size:14px;
      color:var(--muted); transition: all .15s;
    " onmouseover="this.style.borderColor='var(--text)'"
       onmouseout="this.style.borderColor='var(--border)'">
      Сбросить фильтры
    </button>
  </aside>

  <!-- Основной контент -->
  <main class="main">
    <button class="filter-toggle" onclick="toggleSidebar()" style="display:none" id="filterToggleBtn">
      ⚙️ Фильтры
    </button>

    <div class="results-bar" id="resultsBar">Загрузка...</div>

    <div class="cards-grid" id="cardsGrid"></div>

    <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">
      Показать ещё
    </button>

    <div class="empty" id="emptyState" style="display:none">
      <div class="emoji">🔍</div>
      <p>Ничего не найдено. Попробуйте изменить фильтры.</p>
    </div>
  </main>
</div>

<style>
.sub-popover {
  position: fixed;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 8px 28px rgba(80,120,200,0.16);
  z-index: 300;
  min-width: 190px;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.16s ease, transform 0.16s ease;
  pointer-events: none;
}
.sub-popover.open {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.sub-pill {
  display: block;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text2);
  transition: all .12s;
  white-space: nowrap;
}
.sub-pill:hover { background: var(--bg3); color: var(--text); }
.sub-pill.active {
  background: var(--clr-primary-glow);
  color: var(--clr-primary-d);
  font-weight: 600;
}
</style>

<script>
const CAT_BG = {
  'IT':         'linear-gradient(135deg,#EEF2FF,#C7D2FE)',
  'спорт':      'linear-gradient(135deg,#ECFDF5,#A7F3D0)',
  'творчество': 'linear-gradient(135deg,#FFFBEB,#FDE68A)',
  'языки':      'linear-gradient(135deg,#EFF6FF,#BFDBFE)',
  'развитие':   'linear-gradient(135deg,#F5F3FF,#DDD6FE)',
};

function initials(name) {
  return (name || '').split(/[\s«»""]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

// ── Subcategory map ──────────────────────────────────────────────────────────
const SUB_PILLS = {
  'IT': [
    { label: 'Программирование', val: 'школа программирования для детей' },
    { label: 'Робототехника',    val: 'робототехника для детей' },
    { label: 'Арифметика',       val: 'ментальная арифметика дети' },
    { label: 'IT-школы',         val: 'IT школа для детей' },
    { label: 'STEM',             val: 'STEM образование детский центр' },
  ],
  'развитие': [
    { label: 'Шахматы',           val: 'шахматная школа для детей' },
    { label: 'Подготовка к школе',val: 'подготовка к школе частная' },
    { label: 'Логопед',           val: 'логопед детский центр частный' },
    { label: 'Репетиторы',        val: 'репетитор для детей центр' },
  ],
  'спорт': [
    { label: 'Гимнастика',    val: 'гимнастика для детей студия' },
    { label: 'Плавание',      val: 'детская секция бассейн частный' },
    { label: 'Единоборства',  val: 'единоборства для детей секция' },
  ],
  'творчество': [
    { label: 'Музыка',     val: 'частная музыкальная школа для детей' },
    { label: 'Танцы',      val: 'танцевальная студия для детей' },
    { label: 'Рисование',  val: 'детская художественная студия' },
    { label: 'Вокал',      val: 'вокальная студия для детей' },
    { label: 'Театр',      val: 'театральная студия для детей' },
  ],
  'языки': [
    { label: 'Английский',     val: 'курсы английского для детей' },
    { label: 'Языковые школы', val: 'языковая школа для детей' },
  ],
};

let state = {
  category: '', subcategory: '', metro: '', age: '', price_max: '',
  has_trial: false, q: '',
  offset: 0, limit: 24, total: 0, loading: false
};

// ── Init ────────────────────────────────────────────────────────────────────

async function init() {
  // Читаем URL params
  const params = new URLSearchParams(location.search);
  state.q        = params.get('q')        || '';
  state.category = params.get('category') || '';
  state.metro    = params.get('metro')    || '';

  if (state.q) document.getElementById('searchInput').value = state.q;

  // Загружаем мета (категории, метро)
  const meta = await fetch('/api/orgs-meta').then(r => r.json());
  buildCatPills(meta.categories);
  buildMetroSelect(meta.metros);
  addPillHoverBehavior();

  // Выставляем активную категорию
  if (state.category) {
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === state.category);
    });
  }

  await fetchOrgs(false);
}

// ── Filters ─────────────────────────────────────────────────────────────────

function buildCatPills(categories) {
  const container = document.getElementById('catPills');
  categories.forEach(cat => {
    const pill = document.createElement('div');
    pill.className = 'cat-pill';
    pill.dataset.cat = cat;
    pill.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    pill.onclick = () => setCat(pill, cat);
    container.appendChild(pill);
  });
}

function buildMetroSelect(metros) {
  const sel = document.getElementById('metroFilter');
  metros.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    if (m === state.metro) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setCat(el, cat) {
  if (state.category === cat && cat !== '') {
    state.category = '';
    state.subcategory = '';
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('.cat-pill[data-cat=""]').classList.add('active');
    fetchOrgs(false);
    return;
  }
  state.category = cat;
  state.subcategory = '';
  state.offset = 0;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  fetchOrgs(false);
}

const CAT_LABELS = {
  'IT': 'IT', 'развитие': 'развитию', 'спорт': 'спорту',
  'творчество': 'творчеству', 'языки': 'языкам'
};

let _currentPopoverCat = '';

function renderSubPopover(cat, anchorEl) {
  _currentPopoverCat = cat;
  const pop = document.getElementById('subPopover');
  const subs = SUB_PILLS[cat] || [];
  if (!subs.length) { closeSubPopover(); return; }

  const allLabel = 'Все по ' + (CAT_LABELS[cat] || cat);
  pop.innerHTML =
    `<div class="sub-pill sub-pill-all active" onclick="setSub(this,'')">${allLabel}</div>` +
    `<div style="height:1px;background:var(--border);margin:4px 2px"></div>` +
    subs.map(s =>
      `<div class="sub-pill" data-val="${s.val}" onclick="setSub(this,'${s.val}')">${s.label}</div>`
    ).join('');

  // Position to the right of the anchor pill
  const rect = anchorEl.getBoundingClientRect();
  pop.style.top  = (rect.top - 4) + 'px';
  pop.style.left = (rect.right + 10) + 'px';

  pop.classList.remove('open');
  requestAnimationFrame(() => pop.classList.add('open'));
}

function closeSubPopover() {
  document.getElementById('subPopover').classList.remove('open');
}

function setSub(el, val) {
  // Always apply the parent category when clicking anything in the popover
  const cat = _currentPopoverCat;
  state.category = cat;
  state.subcategory = val;
  state.offset = 0;

  // Highlight the right cat-pill
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  const catPill = document.querySelector(`.cat-pill[data-cat="${cat}"]`);
  if (catPill) catPill.classList.add('active');

  closeSubPopover();
  fetchOrgs(false);
}

// ── Hover behaviour for sub-popover ─────────────────────────────────────────
let _hideTimer = null;

function _cancelHide() { clearTimeout(_hideTimer); _hideTimer = null; }
function _scheduleHide() { _cancelHide(); _hideTimer = setTimeout(closeSubPopover, 200); }

function addPillHoverBehavior() {
  document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('mouseenter', () => {
      _cancelHide();
      const cat = pill.dataset.cat;
      if (cat) renderSubPopover(cat, pill);
      else closeSubPopover();
    });
    pill.addEventListener('mouseleave', _scheduleHide);
  });

  const pop = document.getElementById('subPopover');
  pop.addEventListener('mouseenter', _cancelHide);
  pop.addEventListener('mouseleave', _scheduleHide);
}

// Close on click outside
document.addEventListener('click', e => {
  if (!e.target.closest('.cat-pill') && !e.target.closest('#subPopover')) {
    closeSubPopover();
  }
}, true);

function applyFilters() {
  state.metro    = document.getElementById('metroFilter').value;
  state.age      = document.getElementById('ageFilter').value;
  state.price_max= document.getElementById('priceFilter').value;
  state.offset   = 0;
  fetchOrgs(false);
}

function toggleTrial() {
  state.has_trial = !state.has_trial;
  document.getElementById('trialToggle').classList.toggle('on', state.has_trial);
  state.offset = 0;
  fetchOrgs(false);
}

function resetFilters() {
  state = { ...state, category: '', subcategory: '', metro: '', age: '', price_max: '', has_trial: false, q: '', offset: 0 };
  document.getElementById('searchInput').value = '';
  document.getElementById('metroFilter').value = '';
  document.getElementById('ageFilter').value = '';
  document.getElementById('priceFilter').value = '';
  document.getElementById('trialToggle').classList.remove('on');
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.cat-pill[data-cat=""]').classList.add('active');
  closeSubPopover();
  fetchOrgs(false);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Search ───────────────────────────────────────────────────────────────────

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.q = e.target.value.trim();
    state.offset = 0;
    fetchOrgs(false);
  }, 350);
});

// ── Fetch ────────────────────────────────────────────────────────────────────

async function fetchOrgs(append = false) {
  if (state.loading) return;
  state.loading = true;

  let url, data;
  if (state.q) {
    url = `/api/search?q=${encodeURIComponent(state.q)}&limit=${state.limit}&offset=${state.offset}`;
    data = await fetch(url).then(r => r.json());
    state.total = data.items.length + state.offset;
  } else {
    const p = new URLSearchParams();
    if (state.category)    p.set('category', state.category);
    if (state.subcategory) p.set('subcategory', state.subcategory);
    if (state.metro)       p.set('metro', state.metro);
    if (state.age)         p.set('age', state.age);
    if (state.price_max)   p.set('price_max', state.price_max);
    if (state.has_trial)   p.set('has_trial', '1');
    p.set('limit', state.limit);
    p.set('offset', state.offset);
    data = await fetch('/api/orgs?' + p).then(r => r.json());
    state.total = data.total;
  }

  renderCards(data.items, append);
  state.loading = false;
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderCards(items, append) {
  const grid   = document.getElementById('cardsGrid');
  const bar    = document.getElementById('resultsBar');
  const btn    = document.getElementById('loadMoreBtn');
  const empty  = document.getElementById('emptyState');

  if (!append) grid.innerHTML = '';

  if (!items.length && !append) {
    empty.style.display = 'block';
    bar.textContent = 'Ничего не найдено';
    btn.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  bar.textContent = `Найдено: ${state.total} организаций`;

  items.forEach(org => {
    grid.insertAdjacentHTML('beforeend', cardHTML(org));
  });

  const shown = grid.querySelectorAll('.card').length;
  btn.style.display = shown < state.total ? 'block' : 'none';
}

function cardHTML(org) {
  const bg = CAT_BG[org.category] || 'linear-gradient(135deg,#F0F9FF,#E0F2FE)';
  const ini = initials(org.name);
  const photo = (org.photos && org.photos.length)
    ? `<img src="${org.photos[0]}" alt="${esc(org.name)}" loading="lazy"
         onerror="this.outerHTML='<div class=\\'card-initials\\' style=\\'background:${bg}\\'>${ini}</div>'">`
    : `<div class="card-initials" style="background:${bg}">${ini}</div>`;

  const rating = org.rating
    ? `<span class="card-rating">★ ${org.rating.toFixed(1)}</span>` : '';

  const trial = org.has_trial
    ? `<span class="trial-badge">Пробное занятие</span>` : '';

  const metro = org.metro ? `<span>${esc(org.metro)}</span>` : '';
  const age   = org.age_range ? `<span class="dot">·</span><span>${esc(org.age_range)}</span>` : '';

  return `
    <div class="card" onclick="window.location='/org/${org.id}'">
      <div class="card-photo">${photo}</div>
      <div class="card-body">
        <span class="cat-badge">${esc(org.category)}</span>
        <div class="card-name">${esc(org.name)}</div>
        <div class="card-meta">${metro}${age}</div>
        ${trial}
        <div class="card-footer">
          <span class="card-price">${esc(org.price || 'Цена по запросу')}</span>
          ${rating}
        </div>
      </div>
    </div>`;
}

function loadMore() {
  state.offset += state.limit;
  fetchOrgs(true);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Мобильная кнопка фильтров
if (window.innerWidth <= 768) {
  document.getElementById('filterToggleBtn').style.display = 'flex';
}

init();
</script>

<div id="subPopover" class="sub-popover"></div>

<!-- ── Floating buttons ─────────────────────────────────────────────────── -->
<div style="
  position: fixed; bottom: 28px; right: 28px;
  display: flex; flex-direction: column; gap: 10px; z-index: 200;
">
  <button onclick="openQA()" style="
    display: flex; align-items: center; gap: 8px;

    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Связаться
  </button>
</div>

<!-- ── Q&A Modal ────────────────────────────────────────────────────────── -->
<div id="qaOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(30,50,100,.4);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:18px;padding:28px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(30,60,150,.15)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:18px;font-weight:700;color:var(--text)">Частые вопросы</div>
      <button onclick="document.getElementById('qaOverlay').style.display='none'" style="background:var(--bg3);border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:6px 9px;border-radius:8px">×</button>
    </div>
    <div id="qaList"></div>
  </div>
</div>

<!-- ── Contact Modal ────────────────────────────────────────────────────── -->
<div id="contactOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(30,50,100,.4);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:18px;padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(30,60,150,.15)">
    <div id="contactForm">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:18px;font-weight:700;color:var(--text)">Написать нам</div>
        <button onclick="document.getElementById('contactOverlay').style.display='none'" style="background:var(--bg3);border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:6px 9px;border-radius:8px">×</button>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">Ответим в течение нескольких часов</div>

        <label style="display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">Имя *</label>
        <input id="cName" type="text" placeholder="Иван Иванов" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;color:var(--text);font-family:inherit">
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">Телефон или Telegram *</label>
        <input id="cPhone" type="text" placeholder="+7 900 000 00 00 или @username" style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;color:var(--text);font-family:inherit">
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">Сообщение *</label>
        <textarea id="cMessage" placeholder="Вопрос, предложение или обратная связь..." style="width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;resize:none;height:90px;color:var(--text);font-family:inherit"></textarea>
      </div>
      <button id="cSubmit" onclick="submitContact()" style="width:100%;padding:13px;background:var(--clr-primary);border:none;border-radius:10px;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Отправить</button>
    </div>
    <div id="contactSuccess" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text)">Отправлено!</div>
      <div style="font-size:14px;color:var(--muted)">Ответим в течение нескольких часов</div>
    </div>
  </div>
</div>

<style>
#qaOverlay.open, #contactOverlay.open { display: flex !important; }
.qa-item { border: 1px solid var(--border); border-radius: 12px; background: var(--bg2); margin-bottom: 8px; overflow: hidden; }
.qa-q { width:100%;text-align:left;padding:13px 16px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:inherit; }
.qa-q:hover { color: var(--clr-primary); }
.qa-arrow { font-size:16px;color:var(--muted);transition:transform .2s;flex-shrink:0; }
.qa-item.open .qa-arrow { transform:rotate(180deg);color:var(--clr-primary); }
.qa-a { max-height:0;overflow:hidden;transition:max-height .25s ease,padding .2s;font-size:13px;color:var(--text2);line-height:1.65;padding:0 16px; }
.qa-item.open .qa-a { max-height:200px;padding:0 16px 14px; }
</style>

<script>
const QA_ITEMS = [
  { q: 'Бесплатно ли пользоваться каталогом?', a: 'Да, UMKA HUB полностью бесплатен для родителей. Вы выбираете организацию и записываетесь напрямую по официальным ценам без наценок и скрытых комиссий.' },
  { q: 'Как записать ребёнка в кружок?', a: 'Откройте страницу интересующей организации и нажмите «Записаться на занятие». Мы передадим заявку, и организация свяжется с вами в течение нескольких часов.' },
  { q: 'Как быстро мне ответят?', a: 'Обычно в течение нескольких часов в рабочее время. Если организация не вышла на связь больше суток — напишите нам через кнопку «Связаться».' },
  { q: 'Есть ли пробные занятия?', a: 'У многих организаций есть пробное занятие — смотрите значок «Пробное занятие» на карточке. Уточняйте детали при записи.' },
  { q: 'Как добавить свою организацию?', a: 'Напишите нам через кнопку «Связаться» с названием и контактами — разместим в каталоге.' },
];

function openQA() {
  const list = document.getElementById('qaList');
  list.innerHTML = QA_ITEMS.map((item, i) => `
    <div class="qa-item">
      <button class="qa-q" onclick="toggleQA(${i})">
        ${item.q}<span class="qa-arrow">⌄</span>
      </button>
      <div class="qa-a">${item.a}</div>
    </div>`).join('');
  document.getElementById('qaOverlay').classList.add('open');
}

function toggleQA(i) {
  const items = document.querySelectorAll('.qa-item');
  const isOpen = items[i].classList.contains('open');
  items.forEach(el => el.classList.remove('open'));
  if (!isOpen) items[i].classList.add('open');
}

document.getElementById('qaOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('qaOverlay')) e.target.classList.remove('open');
});

function openContact() {
  document.getElementById('contactForm').style.display = 'block';
  document.getElementById('contactSuccess').style.display = 'none';
  ['cName','cPhone','cMessage'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('contactOverlay').classList.add('open');
}

document.getElementById('contactOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('contactOverlay')) e.target.classList.remove('open');
});

async function submitContact() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const msg = document.getElementById('cMessage').value.trim();
  if (!name || !phone || !msg) { alert('Заполните все поля'); return; }
  const btn = document.getElementById('cSubmit');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  try {
    await fetch('/api/lead', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ org_name: 'UMKA HUB — Обратная связь', parent_name: name, phone, comment: msg })
    });
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('contactSuccess').style.display = 'block';
  } catch { alert('Ошибка сети'); }
  finally { btn.disabled = false; btn.textContent = 'Отправить'; }
}
</script>

</body>
</html>
